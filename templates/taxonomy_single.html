{% extends 'base.html' %}

{% block content %}
<h1>#{{ term.name }}</h1>
{% for page in term.pages %}
<article>
    <hgroup>
        <h2><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
        <h3>{{ macros::page_metadata(page=page) }}</h3>
    </hgroup>
    <p>{{ macros::page_description(page=page) }}</p>
</article>
{% endfor %}
{% endblock %}
